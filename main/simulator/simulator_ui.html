<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulateur Irrifrance</title>
<style>
body{font-family:monospace;background:#111;color:#eee;padding:16px;max-width:640px;margin:auto}
h1{color:#4af;margin-bottom:8px}
.section{background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:12px;margin-bottom:12px}
h2{margin:0 0 10px;font-size:1em;color:#aaa;text-transform:uppercase;letter-spacing:.08em}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
label{font-size:.9em}
.badge{padding:3px 10px;border-radius:12px;font-size:.82em;font-weight:bold}
.on{background:#2a6;color:#fff}
.off{background:#444;color:#aaa}
button{background:#2244aa;color:#fff;border:none;border-radius:4px;padding:6px 14px;cursor:pointer;font-size:.9em}
button:active{background:#113388}
.scen-btn{background:#554400;margin:4px 4px 0 0}
#status{font-size:.82em;color:#888;margin-top:4px}
#etat{font-size:1.2em;font-weight:bold;color:#4af}
input[type=range]{width:200px;accent-color:#4af}
</style>
</head>
<body>
<h1>Simulateur Irrifrance</h1>
<div id="status">Connexion...</div>

<div class="section">
  <h2>Etat machine</h2>
  <div id="etat">VEILLE</div>
</div>

<div class="section">
  <h2>Capteurs</h2>
  <div class="row">
    <label>Pressostat (pression ok = LOW)</label>
    <span id="b_pressostat" class="badge off">OFF</span>
  </div>
  <div class="row">
    <label>Fin de course (canon rentre)</label>
    <span id="b_fin_course" class="badge off">OFF</span>
  </div>
  <div class="row">
    <label>Securite spires</label>
    <span id="b_secu_spires" class="badge off">OFF</span>
  </div>
  <div class="row">
    <label>Poumon plein</label>
    <span id="b_poumon_plein" class="badge off">OFF</span>
  </div>
</div>

<div class="section">
  <h2>Injection capteurs</h2>
  <div class="row">
    <label>Pressostat</label>
    <span>
      <button onclick="send('pressostat',0)">Pression OK</button>
      <button onclick="send('pressostat',1)">Pression perdue</button>
    </span>
  </div>
  <div class="row">
    <label>Fin de course</label>
    <span>
      <button onclick="send('fin_course',1)">Activer</button>
      <button onclick="send('fin_course',0)">Desactiver</button>
    </span>
  </div>
  <div class="row">
    <label>Securite spires</label>
    <span>
      <button onclick="send('secu_spires',1)">Activer</button>
      <button onclick="send('secu_spires',0)">Desactiver</button>
    </span>
  </div>
  <div class="row">
    <label>Poumon plein</label>
    <span>
      <button onclick="send('poumon_plein',1)">Activer</button>
      <button onclick="send('poumon_plein',0)">Desactiver</button>
    </span>
  </div>
</div>

<div class="section">
  <h2>Tension batterie</h2>
  <div class="row">
    <label>Simuler tension</label>
    <span>
      <input type="range" id="batt-slider" min="100" max="145" step="1" value="125"
             oninput="updateBattSlider(this.value)">
      &nbsp;<strong id="batt-vval">12.5</strong> V
    </span>
  </div>
  <div class="row">
    <label id="batt-etat-lbl" style="color:#aaa">Pleine</label>
    <button onclick="disableBattSim()">ADC reel</button>
  </div>
</div>

<div class="section">
  <h2>Simulation deroulement</h2>
  <div class="row">
    <label>Commencer le deroulement</label>
    <button onclick="send('start_deroule',1)">Commencer</button>
  </div>
  <div class="row">
    <label>Vitesse tracteur</label>
    <span>
      <input type="range" id="deroule-slider" min="0" max="80" step="5" value="0"
             oninput="updateDerouleSlider(this.value)">
      &nbsp;<strong id="deroule-vval">0.0</strong> km/h
    </span>
  </div>
  <div class="row">
    <label>&nbsp;</label>
    <button onclick="stopDeroule()">Arreter</button>
  </div>
</div>

<div class="section">
  <h2>Scenarios rapides</h2>
  <button class="scen-btn" onclick="scenario(1)">1 Cycle normal</button>
  <button class="scen-btn" onclick="scenario(3)">3 Perte pression</button>
  <button class="scen-btn" onclick="scenario(4)">4 Reprise pression</button>
  <button class="scen-btn" onclick="scenario(5)">5 Urgence spires</button>
  <button class="scen-btn" onclick="scenario(6)">6 Urgence fin course</button>
</div>

<script>
var ws = null;
var badges = {pressostat:0, fin_course:0, secu_spires:0, poumon_plein:0};

var ETATS = ['VEILLE','OUVERTURE_CANON','TEMPO_DEPART','REMPLISSAGE_POUMON',
             'EN_COURS','PAUSE_PRESSION','TEMPO_ARRIVEE','ARRET_FINAL','ARRET_URGENCE'];

function connect() {
  ws = new WebSocket('ws://' + location.hostname + '/ws_test');
  ws.onopen  = function() { document.getElementById('status').textContent = 'Connecte'; };
  ws.onclose = function() { document.getElementById('status').textContent = 'Deconnecte'; setTimeout(connect, 2000); };
  ws.onerror = function() { ws.close(); };
}

function send(sim, val) {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({sim: sim, value: val}));
    badges[sim] = val;
    updateBadge(sim);
  }
}

function scenario(n) {
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({scenario: n}));
}

function updateBadge(key) {
  var el = document.getElementById('b_' + key);
  if (!el) return;
  el.className = 'badge ' + (badges[key] ? 'on' : 'off');
  el.textContent = badges[key] ? 'ON' : 'OFF';
}

var BATT_ETATS = ['En charge','Pleine','Correcte','Faible','Critique'];
var BATT_COLORS = ['#3b82f6','#22c55e','#eab308','#f97316','#ef4444'];
function battEtatFromV(v) {
  if (v >= 13.5) return 0;
  if (v >= 12.4) return 1;
  if (v >= 11.8) return 2;
  if (v >= 11.5) return 3;
  return 4;
}
function updateBattSlider(raw) {
  var v = raw / 10;
  document.getElementById('batt-vval').textContent = v.toFixed(1);
  var idx = battEtatFromV(v);
  var lbl = document.getElementById('batt-etat-lbl');
  lbl.textContent = BATT_ETATS[idx];
  lbl.style.color = BATT_COLORS[idx];
  send('batt_v', parseInt(raw));
}
function updateDerouleSlider(raw) {
  var kmh = raw / 10;
  document.getElementById('deroule-vval').textContent = kmh.toFixed(1);
  send('vitesse_deroule', parseInt(raw));
}
function stopDeroule() {
  document.getElementById('deroule-slider').value = 0;
  document.getElementById('deroule-vval').textContent = '0.0';
  send('vitesse_deroule', 0);
}

function disableBattSim() {
  document.getElementById('batt-etat-lbl').textContent = 'ADC reel actif';
  document.getElementById('batt-etat-lbl').style.color = '#888';
  send('batt_v', 0);
}

// Recuperer le statut depuis le WS principal /ws
var ws_main = null;
function connectMain() {
  ws_main = new WebSocket('ws://' + location.hostname + '/ws');
  ws_main.onmessage = function(ev) {
    try {
      var d = JSON.parse(ev.data);
      if (d.etat !== undefined) {
        document.getElementById('etat').textContent = ETATS[d.etat] || d.etat;
      }

    } catch(e) {}
  };
  ws_main.onclose = function() { setTimeout(connectMain, 2000); };
}

connect();
connectMain();
</script>
</body>
</html>
